app = 'shabeko-discord-bot'
kill_signal = "SIGINT"
kill_timeout = 5
processes = []

[build]
  dockerfile = "docker/Dockerfile"

[env]

[experimental]
  allowed_public_ports = []
  auto_rollback = true

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[services]]
  http_checks = []
  processes = ["app"]
  script_checks = []
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"
